<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 400">
  <defs>
    <style type="text/css">
      .building { fill: #16213e; }
      .window { fill: #ffd700; opacity: 0.8; }
      .sky { fill: url(#sky-grad); }
      .cloud { fill: #ffffff; opacity: 0.7; }
      .tree-trunk { fill: #3e2723; }
      .tree-canopy { fill: #2e7d32; }
    </style>
    <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="60%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="ground-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="70%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="window-pattern" width="20" height="30" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="6" height="8" class="window" rx="1"/>
      <rect x="13" y="3" width="6" height="8" class="window" rx="1"/>
      <rect x="3" y="18" width="6" height="8" class="window" rx="1"/>
      <rect x="13" y="18" width="6" height="8" class="window" rx="1"/>
    </pattern>
    <clipPath id="scene-clip">
      <rect x="0" y="0" width="800" height="400"/>
    </clipPath>
  </defs>
  <g clip-path="url(#scene-clip)">
    <!-- Sky -->
    <rect class="sky" width="800" height="400"/>
    <!-- Moon -->
    <g id="moon" transform="translate(650, 60)">
      <circle r="50" fill="url(#moon-glow)"/>
      <circle r="25" fill="#fffde7"/>
      <circle cx="5" cy="-3" r="4" fill="#fff9c4" opacity="0.5"/>
      <circle cx="-8" cy="6" r="3" fill="#fff9c4" opacity="0.4"/>
    </g>
    <!-- Clouds -->
    <g class="cloud" transform="translate(100, 80)">
      <ellipse cx="0" cy="0" rx="40" ry="15"/>
      <ellipse cx="30" cy="-5" rx="30" ry="12"/>
      <ellipse cx="-20" cy="3" rx="25" ry="10"/>
    </g>
    <g class="cloud" transform="translate(500, 50)">
      <ellipse cx="0" cy="0" rx="35" ry="12"/>
      <ellipse cx="25" cy="-3" rx="25" ry="10"/>
    </g>
    <!-- Buildings back row -->
    <g id="buildings-back">
      <rect class="building" x="30" y="180" width="60" height="220" opacity="0.6"/>
      <rect class="building" x="100" y="140" width="45" height="260" opacity="0.6"/>
      <rect class="building" x="200" y="120" width="70" height="280" opacity="0.6"/>
      <rect class="building" x="320" y="160" width="50" height="240" opacity="0.6"/>
      <rect class="building" x="450" y="100" width="80" height="300" opacity="0.6"/>
      <rect class="building" x="580" y="150" width="55" height="250" opacity="0.6"/>
      <rect class="building" x="700" y="130" width="65" height="270" opacity="0.6"/>
    </g>
    <!-- Buildings front row -->
    <g id="buildings-front">
      <rect class="building" x="0" y="220" width="80" height="180"/>
      <rect x="0" y="220" width="80" height="180" fill="url(#window-pattern)"/>
      <rect class="building" x="90" y="180" width="55" height="220"/>
      <rect x="90" y="180" width="55" height="220" fill="url(#window-pattern)"/>
      <rect class="building" x="160" y="160" width="90" height="240"/>
      <rect x="160" y="160" width="90" height="240" fill="url(#window-pattern)"/>
      <rect class="building" x="270" y="200" width="65" height="200"/>
      <rect x="270" y="200" width="65" height="200" fill="url(#window-pattern)"/>
      <rect class="building" x="350" y="140" width="100" height="260"/>
      <rect x="350" y="140" width="100" height="260" fill="url(#window-pattern)"/>
      <rect class="building" x="470" y="190" width="70" height="210"/>
      <rect x="470" y="190" width="70" height="210" fill="url(#window-pattern)"/>
      <rect class="building" x="560" y="170" width="85" height="230"/>
      <rect x="560" y="170" width="85" height="230" fill="url(#window-pattern)"/>
      <rect class="building" x="660" y="200" width="140" height="200"/>
      <rect x="660" y="200" width="140" height="200" fill="url(#window-pattern)"/>
    </g>
    <!-- Trees -->
    <g id="trees" transform="translate(0, 360)">
      <g transform="translate(55, 0)">
        <rect class="tree-trunk" x="-3" y="-20" width="6" height="20"/>
        <path class="tree-canopy" d="M0-50 l15 30 h-30 z"/>
      </g>
      <g transform="translate(340, 0)">
        <rect class="tree-trunk" x="-3" y="-25" width="6" height="25"/>
        <path class="tree-canopy" d="M0-55 l18 30 h-36 z"/>
      </g>
      <g transform="translate(650, 0)">
        <rect class="tree-trunk" x="-3" y="-18" width="6" height="18"/>
        <path class="tree-canopy" d="M0-45 l14 27 h-28 z"/>
      </g>
    </g>
    <!-- Ground -->
    <rect x="0" y="380" width="800" height="20" fill="url(#ground-grad)"/>
  </g>
</svg>
