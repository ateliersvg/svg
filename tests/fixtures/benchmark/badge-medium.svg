<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="badge-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.8" fill="#b8860b" opacity="0.3"/>
    </pattern>
    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g id="badge-group" filter="url(#badge-shadow)">
    <g id="badge-body" transform="translate(0, 0)">
      <circle cx="50" cy="45" r="38" fill="url(#badge-bg)" stroke="#b8860b" stroke-width="2"/>
      <circle cx="50" cy="45" r="38" fill="url(#dots)"/>
      <circle cx="50" cy="45" r="32" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    </g>
    <g id="star-group" transform="translate(50, 42)">
      <polygon points="0,-22 6,-8 20,-8 9,3 13,18 0,10 -13,18 -9,3 -20,-8 -6,-8" fill="#ffffff" stroke="#b8860b" stroke-width="0.75" stroke-linejoin="round"/>
    </g>
    <g id="ribbon-group">
      <path d="M20 78 L30 65 L50 80 L70 65 L80 78 L75 100 L50 90 L25 100 Z" fill="#c41e3a" stroke="#8b0000" stroke-width="1" stroke-linejoin="round"/>
      <path d="M32 68 L50 78 L68 68" fill="none" stroke="#8b0000" stroke-width="0.5" opacity="0.5"/>
    </g>
    <g id="label-group">
      <text x="50" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#ffffff" stroke="none">CHAMPION</text>
    </g>
  </g>
</svg>
