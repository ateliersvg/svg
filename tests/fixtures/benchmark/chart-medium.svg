<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Monthly Sales Bar Chart">
  <title>Monthly Sales Data</title>
  <desc>A bar chart showing monthly sales figures for January through May with grid lines and legend</desc>
  <defs>
    <linearGradient id="bar-gradient-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4e79a7"/>
      <stop offset="100%" stop-color="#3a5f8a"/>
    </linearGradient>
    <linearGradient id="bar-gradient-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f28e2b"/>
      <stop offset="100%" stop-color="#d4781f"/>
    </linearGradient>
    <pattern id="hatch" width="4" height="4" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Grid lines -->
  <g id="grid" stroke="#e0e0e0" stroke-width="0.5">
    <line x1="60" y1="40" x2="380" y2="40"/>
    <line x1="60" y1="80" x2="380" y2="80"/>
    <line x1="60" y1="120" x2="380" y2="120"/>
    <line x1="60" y1="160" x2="380" y2="160"/>
    <line x1="60" y1="200" x2="380" y2="200"/>
    <line x1="60" y1="240" x2="380" y2="240"/>
  </g>
  <!-- Y axis labels -->
  <g id="y-labels" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="end">
    <text x="55" y="44">300</text>
    <text x="55" y="84">250</text>
    <text x="55" y="124">200</text>
    <text x="55" y="164">150</text>
    <text x="55" y="204">100</text>
    <text x="55" y="244">50</text>
  </g>
  <!-- Axes -->
  <g id="axes" stroke="#333333" stroke-width="1.5">
    <line x1="60" y1="30" x2="60" y2="260" stroke-linecap="round"/>
    <line x1="60" y1="260" x2="385" y2="260" stroke-linecap="round"/>
  </g>
  <!-- Bars - Series A -->
  <g id="series-a" aria-label="Series A - Revenue">
    <rect x="75" y="108" width="24" height="152" fill="url(#bar-gradient-1)" rx="2" data-value="190" data-month="Jan" role="graphics-symbol" aria-label="January: 190"/>
    <rect x="75" y="108" width="24" height="152" fill="url(#hatch)"/>
    <rect x="140" y="68" width="24" height="192" fill="url(#bar-gradient-1)" rx="2" data-value="240" data-month="Feb" role="graphics-symbol" aria-label="February: 240"/>
    <rect x="140" y="68" width="24" height="192" fill="url(#hatch)"/>
    <rect x="205" y="148" width="24" height="112" fill="url(#bar-gradient-1)" rx="2" data-value="140" data-month="Mar" role="graphics-symbol" aria-label="March: 140"/>
    <rect x="205" y="148" width="24" height="112" fill="url(#hatch)"/>
    <rect x="270" y="48" width="24" height="212" fill="url(#bar-gradient-1)" rx="2" data-value="265" data-month="Apr" role="graphics-symbol" aria-label="April: 265"/>
    <rect x="270" y="48" width="24" height="212" fill="url(#hatch)"/>
    <rect x="335" y="128" width="24" height="132" fill="url(#bar-gradient-1)" rx="2" data-value="165" data-month="May" role="graphics-symbol" aria-label="May: 165"/>
    <rect x="335" y="128" width="24" height="132" fill="url(#hatch)"/>
  </g>
  <!-- Bars - Series B -->
  <g id="series-b" aria-label="Series B - Costs">
    <rect x="101" y="168" width="24" height="92" fill="url(#bar-gradient-2)" rx="2" data-value="115" data-month="Jan"/>
    <rect x="166" y="148" width="24" height="112" fill="url(#bar-gradient-2)" rx="2" data-value="140" data-month="Feb"/>
    <rect x="231" y="188" width="24" height="72" fill="url(#bar-gradient-2)" rx="2" data-value="90" data-month="Mar"/>
    <rect x="296" y="128" width="24" height="132" fill="url(#bar-gradient-2)" rx="2" data-value="165" data-month="Apr"/>
    <rect x="361" y="158" width="24" height="102" fill="url(#bar-gradient-2)" rx="2" data-value="127" data-month="May"/>
  </g>
  <!-- X axis labels -->
  <g id="x-labels" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">
    <text x="100" y="276">Jan</text>
    <text x="165" y="276">Feb</text>
    <text x="230" y="276">Mar</text>
    <text x="295" y="276">Apr</text>
    <text x="360" y="276">May</text>
  </g>
  <!-- Legend -->
  <g id="legend" transform="translate(280, 15)">
    <rect x="0" y="0" width="12" height="12" fill="url(#bar-gradient-1)" rx="1"/>
    <text x="16" y="10" font-family="Arial, sans-serif" font-size="9" fill="#333">Revenue</text>
    <rect x="60" y="0" width="12" height="12" fill="url(#bar-gradient-2)" rx="1"/>
    <text x="76" y="10" font-family="Arial, sans-serif" font-size="9" fill="#333">Costs</text>
  </g>
</svg>
