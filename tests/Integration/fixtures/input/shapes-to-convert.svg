<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Various shapes that can be converted to paths -->
  <rect x="10" y="10" width="80" height="40" fill="red"/>
  <rect x="110" y="10" width="80" height="40" rx="10" ry="10" fill="blue"/>
  <circle cx="50" cy="100" r="30" fill="green"/>
  <ellipse cx="150" cy="100" rx="40" ry="25" fill="yellow"/>
  <line x1="10" y1="150" x2="90" y2="150" stroke="black" stroke-width="3"/>
  <polygon points="120,140 150,180 180,140" fill="purple"/>
  <polyline points="10,190 30,170 50,190 70,170 90,190" fill="none" stroke="orange" stroke-width="2"/>
</svg>
