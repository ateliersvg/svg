<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Complex SVG with transforms, nested groups, and empty elements -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgb(255,255,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255,0,0);stop-opacity:1" />
    </linearGradient>
  </defs>

  <g id="layer1">
    <g id="empty-group"></g>
    <rect x="10" y="10" width="50" height="50" fill="url(#grad1)" transform="translate(0, 0)"/>
    <g transform="translate(100, 0)">
      <circle cx="35" cy="35" r="25" fill="#3498db" stroke="#2c3e50" stroke-width="2.00"/>
      <circle cx="85" cy="35" r="25" fill="#3498db" stroke="#2c3e50" stroke-width="2.00"/>
    </g>
  </g>

  <g id="layer2" opacity="1.0">
    <rect x="10" y="100" width="280" height="1" fill="#cccccc" stroke="none"/>
    <g>
      <rect x="50" y="120" width="40" height="60" fill="#e74c3c" stroke-width="0"/>
      <rect x="100" y="120" width="40" height="60" fill="#e74c3c" stroke-width="0"/>
      <rect x="150" y="120" width="40" height="60" fill="#e74c3c" stroke-width="0"/>
    </g>
  </g>

  <!-- Empty text element -->
  <text x="10" y="250"></text>

  <!-- Comment should be removed -->
  <!-- This is a test comment -->
</svg>
